<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up page of finance manager - Vault IQ</title>
  <link rel="stylesheet" href="signup.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body>
  <div class="loader-cont">
    <div class="loader"></div>
  </div>
  <div class="signup-container">
    <div class="signup-card">
      <h1>Sign Up</h1>
      <p>Create your account to get started</p>

      <!-- <form> -->
        <div class="input-group">
          <input type="text" placeholder="Full Name" required />
          <span class="spanErr">Name can't be blank</span>
        </div>

        <div class="input-group">
          <input type="email" placeholder="Email" required />
          <span class="spanErr">Email can't be blank</span>
        </div>

        <div class="input-group password-group">
          <input type="password" placeholder="Password" required />
          <i class="fa-regular fa-eye"></i>
          <span class="spanErr">password should contain characters,digits,special-symbols</span>
        </div>

        <div class="input-group password-group">
          <input type="password" placeholder="Confirm Password" required />
          <i class="fa-regular fa-eye"></i>
          <span class="spanErr">password should be checked same</span>
        </div>

        <div class="input-group password-group">
          <input type="number" placeholder="Your monthly income" required />
          <span class="spanErr">Income should be filled</span>
        </div>

        <div class="options">
          <label>
            <input type="checkbox" />
            I agree to the terms
          </label>
          <span class="spanErr">click the checkbox to agree</span>
        </div>

        <button type="submit">Create Account</button>
      <!-- </form> -->

      <div class="bottom-text">
        Already have an account? <a href="./index.html">Sign in</a>
      </div>
    </div>
  </div>
</body>
<script type="module" src="./js/signup.js"></script>
</html>

<!-- HTML DONE -->
